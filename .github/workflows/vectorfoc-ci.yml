name: VectorFOC CI

on:
  push:
    paths:
      - "**"
  pull_request:
    paths:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake make

      - name: Build firmware (CMake + arm-none-eabi)
        run: |
          mkdir -p build
          cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=cmake/gcc-arm-none-eabi.cmake
          cmake --build build -j2

      - name: Build tests (host)
        run: |
          mkdir -p test/build-ci
          cmake -S test -B test/build-ci
          cmake --build test/build-ci -j2

      - name: Run tests (host)
        run: |
          ctest --test-dir test/build-ci --output-on-failure

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: firmware-binaries
          path: |
            build/VectorFoc.elf
            build/VectorFoc.bin
            build/VectorFoc.hex
          retention-days: 30
